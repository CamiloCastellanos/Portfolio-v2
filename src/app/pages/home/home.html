<span class="text-xl text-[var(--text-muted)] mb-2" data-anim="home-greeting">
  👋 {{ 'home.greeting' | transloco }}
</span>

<h1
  class="text-4xl md:text-5xl font-semibold text-[var(--text-primary)] leading-tight"
  data-anim="home-name"
>
  Camilo Castellanos
  <br />
  <span class="text-[var(--accent)]" data-anim="home-position">
    {{ 'home.position' | transloco }}
  </span>
</h1>

<p class="mt-4 text-base md:text-lg text-[var(--text-secondary)] max-w-lg" data-anim="home-text">
  {{ 'home.text' | transloco }}
</p>

<div class="flex items-center gap-3 mt-6" data-anim="home-buttons">
  <button
    class="px-2.5 py-2.5 rounded-xl bg-[var(--accent)] text-white text-sm font-medium hover:bg-[var(--accent-hover)] transition-all duration-200 flex items-center"
    (click)="scrollToProjects()"
  >
    {{ 'home.btnProject' | transloco }}
    <ng-icon class="ml-2" name="bootstrapFolder" [size]="sizeIcon" />
  </button>
  <a
    [href]="urlCV"
    target="_blank"
    class="px-2.5 py-2.5 rounded-xl border border-[var(--border)] text-sm font-medium text-[var(--text-primary)] hover:bg-[var(--bg-hover)] transition-all duration-200 flex items-center"
  >
    {{ 'home.btnCV' | transloco }}
    <ng-icon class="ml-2" name="bootstrapDownload" [size]="sizeIcon" />
  </a>
</div>

<call-to-scroll class="flex flex-col items-center" data-anim="home-cta"></call-to-scroll>
