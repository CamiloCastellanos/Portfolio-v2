<div class="space-y-8 sm:space-y-10 lg:space-y-12">
  <div class="relative" data-anim="cert-title">
    <h2 class="text-2xl sm:text-3xl font-semibold text-[var(--text-primary)] tracking-tight">
      {{ 'certificate.title' | transloco }}
    </h2>
    <div
      class="absolute -bottom-3 left-0 w-12 h-0.5 bg-[var(--accent)] rounded-full"
      data-anim="cert-title-line"
    ></div>
  </div>

  <gallery [certificateList]="certificateList" />
</div>
