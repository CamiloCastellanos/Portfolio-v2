<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-5">
  @for (cert of certificateList; track $index) {
    <a
      class="cert-lightbox group rounded-xl overflow-hidden border border-[var(--border)] bg-[var(--bg-card)] hover:shadow-lg transition-all duration-300 hover:-translate-y-1 cursor-pointer"
      [href]="cert.image"
      [attr.data-title]="cert.title"
      data-anim="cert-card"
    >
      <div class="relative overflow-hidden">
        <img
          [src]="cert.image"
          [alt]="cert.title"
          class="w-full h-40 object-cover transition-transform duration-500 group-hover:scale-105"
        />
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition"></div>
      </div>

      <div class="p-4">
        <h4 class="text-sm font-semibold text-[var(--text-primary)] line-clamp-2">
          {{ cert.title }}
        </h4>
      </div>
    </a>
  }
</div>
