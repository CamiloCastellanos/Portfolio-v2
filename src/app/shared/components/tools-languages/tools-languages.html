<div class="relative mb-4 sm:mb-6">
  <h3 class="text-lg sm:text-xl font-medium text-[var(--text-primary)]">
    {{ 'tools&languages.title' | transloco }}
  </h3>
  <div class="absolute -bottom-2 left-0 w-8 h-0.5 bg-[var(--accent-border)] rounded-full"></div>
</div>
@if (aditionalText != '') {
  <div class="mb-6 sm:mb-8">
    <p class="text-sm text-[var(--text-secondary)] mt-1 max-w-xl">
      {{ aditionalText | transloco }}
    </p>
  </div>
}
<div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-3 xl:grid-cols-3 gap-4">
  @for (tool of toolList; track $index) {
    <div
      class="group flex items-center gap-3 p-3 rounded-xl bg-[var(--bg-card)] border border-[var(--border)] hover:border-[var(--accent-border)] hover:shadow-md transition-all duration-300 hover:-translate-y-0.5"
    >
      <img [src]="tool.image" [alt]="tool.name" class="w-8 h-8 object-contain" />
      <span
        class="text-sm font-medium text-[var(--text-primary)] group-hover:text-[var(--accent)] transition-colors"
      >
        {{ tool.name }}
      </span>
    </div>
  }
</div>
