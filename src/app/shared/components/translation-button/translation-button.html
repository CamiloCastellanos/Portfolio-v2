<button
  class="group relative flex items-center justify-center w-10 h-10 rounded-full border border-[var(--border)] bg-[var(--bg-card)] shadow-sm hover:border-[var(--accent-border)] hover:bg-[var(--bg-hover)] hover:shadow-md hover:scale-105 transition-all duration-300 ease-out"
  (click)="changeLang()"
>
  <figure class="relative w-full h-full p-0.5">
    <img
      [src]="image"
      alt="Cambiar idioma"
      class="relative w-full h-full rounded-full object-cover"
    />
  </figure>

  <div
    class="absolute -inset-px rounded-full opacity-0 group-hover:opacity-100 border border-[var(--accent-border)] transition-opacity duration-300"
  ></div>
</button>
